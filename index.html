<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com wss://*.firebaseio.com; img-src 'self' data:; font-src 'self' data:;">
    <title>Conciliador de Cuentas</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y dependencias -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        window.FirebaseSDK = {
            initializeApp, getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
            getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc,
            query, where, getDocs
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        window.addEventListener('load', () => {
            const { useState, useMemo, useEffect, useRef } = React;
            const {
                initializeApp, getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
                getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc,
                query, where, getDocs
            } = window.FirebaseSDK;
            
            // ==========================================
            // COMPONENTE DE ÍCONOS NATIVOS
            // ==========================================
            const Icon = ({ name, className }) => {
              const svgs = {
                Wallet: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                User: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Lock: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
                Eye: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
                ChevronLeft: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
                LogIn: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>,
                LogOut: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                TrendingUp: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
                Receipt: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg>,
                ArrowRightLeft: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>,
                PlusCircle: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>,
                ArrowUpRight: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>,
                ArrowDownRight: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 17h10V7"/><path d="M7 7l10 10"/></svg>,
                Trash2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                Calendar: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
                BarChart: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></svg>,
                Search: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>,
                Home: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                Clock: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              };
              return svgs[name] || null;
            };

            // ==========================================
            // CONFIGURACIÓN DE FIREBASE
            // ==========================================
            const firebaseConfig = {
              apiKey: "AIzaSyDLbCgA1WE4jX1xbM3rQxQkJyEmcxQ0Jq4",
              authDomain: "conciliadordegastos.firebaseapp.com",
              projectId: "conciliadordegastos",
              storageBucket: "conciliadordegastos.firebasestorage.app",
              messagingSenderId: "582213473102",
              appId: "1:582213473102:web:83a62cfd183a1f2532c41f"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // Tiempo de inactividad: 15 minutos
            const INACTIVITY_TIMEOUT = 15 * 60 * 1000;

            const MONTH_NAMES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

            function App() {
              const [firebaseUser, setFirebaseUser] = useState(null);
              const [currentUser, setCurrentUser] = useState(null);
              const [isLoading, setIsLoading] = useState(true);

              const [email, setEmail] = useState('');
              const [password, setPassword] = useState('');
              const [authError, setAuthError] = useState('');

              const [transactions, setTransactions] = useState([]);
              const [txToDelete, setTxToDelete] = useState(null);

              const [activeTab, setActiveTab] = useState('expense');
              const [amount, setAmount] = useState('');
              const [description, setDescription] = useState('');
              const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
              const [paidBy, setPaidBy] = useState('Marco');
              const [splitType, setSplitType] = useState('shared');

              // Navegación entre vistas
              const [currentView, setCurrentView] = useState('home'); // home | monthly | yearly | search

              // Filtros de vistas
              const now = new Date();
              const [selectedMonth, setSelectedMonth] = useState(now.getMonth());
              const [selectedYear, setSelectedYear] = useState(now.getFullYear());
              const [searchTerm, setSearchTerm] = useState('');

              // Aviso de cierre por inactividad
              const [inactivityNotice, setInactivityNotice] = useState(false);
              const inactivityTimerRef = useRef(null);

              useEffect(() => {
                if (currentUser?.id === 'marco') setPaidBy('Marco');
                if (currentUser?.id === 'eliana') setPaidBy('Eliana');
              }, [currentUser]);

              useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (user) => {
                  if (user) {
                    setFirebaseUser(user);
                    try {
                      const q = query(collection(db, 'usuarios'), where('email', '==', user.email.toLowerCase()));
                      const snapshot = await getDocs(q);
                      if (!snapshot.empty) {
                        const data = snapshot.docs[0].data();
                        setCurrentUser({ id: snapshot.docs[0].id, name: data.name, role: data.role });
                      } else {
                        setCurrentUser({ id: 'guest', name: user.email, role: 'viewer' });
                      }
                    } catch (err) {
                      console.error('Error cargando perfil:', err);
                      setCurrentUser({ id: 'guest', name: user.email, role: 'viewer' });
                    }
                  } else {
                    setFirebaseUser(null);
                    setCurrentUser(null);
                  }
                });
                return () => unsubscribe();
              }, []);

              useEffect(() => {
                if (!firebaseUser) return;
                
                const unsubscribe = onSnapshot(collection(db, 'movimientos'), (snapshot) => {
                  const data = [];
                  snapshot.forEach(document => {
                    data.push({ id: document.id, ...document.data() });
                  });
                  data.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setTransactions(data);
                  setIsLoading(false);
                }, (error) => {
                  console.error("Error obteniendo datos:", error);
                  setIsLoading(false);
                });

                return () => unsubscribe();
              }, [firebaseUser]);

              // ==========================================
              // CIERRE AUTOMÁTICO POR INACTIVIDAD (15 min)
              // ==========================================
              useEffect(() => {
                if (!firebaseUser) return;

                const resetTimer = () => {
                  if (inactivityTimerRef.current) clearTimeout(inactivityTimerRef.current);
                  inactivityTimerRef.current = setTimeout(() => {
                    setInactivityNotice(true);
                    signOut(auth);
                  }, INACTIVITY_TIMEOUT);
                };

                const events = ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'];
                events.forEach(ev => window.addEventListener(ev, resetTimer, { passive: true }));
                resetTimer();

                return () => {
                  if (inactivityTimerRef.current) clearTimeout(inactivityTimerRef.current);
                  events.forEach(ev => window.removeEventListener(ev, resetTimer));
                };
              }, [firebaseUser]);

              const { totalGastado, marcoBalance, marcoGastos, elianaGastos, marcoNeto, elianaNeto } = useMemo(() => {
                let balance = 0;
                let mGastos = 0;
                let eGastos = 0;
                let mNeto = 0;
                let eNeto = 0;

                transactions.forEach(t => {
                  const amt = parseFloat(t.amount);
                  if (t.type === 'expense') {
                    if (t.paidBy === 'Marco') {
                      mGastos += amt;
                      if (t.splitType === 'shared') { balance += amt / 2; mNeto += amt / 2; eNeto += amt / 2; }
                      else { mNeto += amt; }
                    } else {
                      eGastos += amt;
                      if (t.splitType === 'shared') { balance -= amt / 2; mNeto += amt / 2; eNeto += amt / 2; }
                      else { eNeto += amt; }
                    }
                  } else if (t.type === 'payment') {
                    if (t.paidBy === 'Eliana') balance -= amt;
                    else balance += amt;
                  }
                });

                return {
                  totalGastado: mGastos + eGastos,
                  marcoBalance: balance,
                  marcoGastos: mGastos,
                  elianaGastos: eGastos,
                  marcoNeto: mNeto,
                  elianaNeto: eNeto
                };
              }, [transactions]);

              // Datos del mes seleccionado
              const monthlyData = useMemo(() => {
                const filtered = transactions.filter(t => {
                  if (t.type !== 'expense') return false;
                  const d = new Date(t.date);
                  return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                });

                let marco = 0, eliana = 0;
                let marcoNeto = 0, elianaNeto = 0;
                filtered.forEach(t => {
                  const amt = parseFloat(t.amount);
                  if (t.paidBy === 'Marco') marco += amt;
                  else eliana += amt;
                  if (t.splitType === 'shared') { marcoNeto += amt / 2; elianaNeto += amt / 2; }
                  else if (t.paidBy === 'Marco') marcoNeto += amt;
                  else elianaNeto += amt;
                });

                return { total: marco + eliana, marco, eliana, marcoNeto, elianaNeto, items: filtered };
              }, [transactions, selectedMonth, selectedYear]);

              // Datos del año seleccionado (desglose por mes)
              const yearlyData = useMemo(() => {
                const months = Array.from({ length: 12 }, () => ({ marco: 0, eliana: 0, marcoNeto: 0, elianaNeto: 0, total: 0 }));
                let totalMarco = 0, totalEliana = 0;
                let totalMarcoNeto = 0, totalElianaNeto = 0;

                transactions.forEach(t => {
                  if (t.type !== 'expense') return;
                  const d = new Date(t.date);
                  if (d.getFullYear() !== selectedYear) return;
                  const m = d.getMonth();
                  const amt = parseFloat(t.amount);
                  if (t.paidBy === 'Marco') {
                    months[m].marco += amt;
                    totalMarco += amt;
                  } else {
                    months[m].eliana += amt;
                    totalEliana += amt;
                  }
                  if (t.splitType === 'shared') {
                    months[m].marcoNeto += amt / 2; months[m].elianaNeto += amt / 2;
                    totalMarcoNeto += amt / 2; totalElianaNeto += amt / 2;
                  } else if (t.paidBy === 'Marco') {
                    months[m].marcoNeto += amt; totalMarcoNeto += amt;
                  } else {
                    months[m].elianaNeto += amt; totalElianaNeto += amt;
                  }
                  months[m].total = months[m].marco + months[m].eliana;
                });

                return { months, totalMarco, totalEliana, totalMarcoNeto, totalElianaNeto, total: totalMarco + totalEliana };
              }, [transactions, selectedYear]);

              // Años disponibles
              const availableYears = useMemo(() => {
                const years = new Set();
                transactions.forEach(t => years.add(new Date(t.date).getFullYear()));
                years.add(now.getFullYear());
                return Array.from(years).sort((a, b) => b - a);
              }, [transactions]);

              // Búsqueda por concepto
              const searchResults = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const term = searchTerm.toLowerCase().trim();
                return transactions.filter(t => (t.description || '').toLowerCase().includes(term));
              }, [transactions, searchTerm]);

              // Lista de conceptos únicos con total y conteo
              const conceptList = useMemo(() => {
                const map = new Map();
                transactions.forEach(t => {
                  if (t.type !== 'expense') return;
                  const label = (t.description || '').trim();
                  if (!label) return;
                  const key = label.toLowerCase();
                  const amt = parseFloat(t.amount);
                  const entry = map.get(key) || { label, total: 0, count: 0 };
                  entry.total += amt;
                  entry.count += 1;
                  map.set(key, entry);
                });
                return Array.from(map.values()).sort((a, b) => b.total - a.total);
              }, [transactions]);

              const searchSummary = useMemo(() => {
                let marco = 0, eliana = 0;
                let marcoNeto = 0, elianaNeto = 0;
                searchResults.forEach(t => {
                  if (t.type !== 'expense') return;
                  const amt = parseFloat(t.amount);
                  if (t.paidBy === 'Marco') marco += amt;
                  else eliana += amt;
                  if (t.splitType === 'shared') { marcoNeto += amt / 2; elianaNeto += amt / 2; }
                  else if (t.paidBy === 'Marco') marcoNeto += amt;
                  else elianaNeto += amt;
                });
                return { total: marco + eliana, marco, eliana, marcoNeto, elianaNeto, count: searchResults.length };
              }, [searchResults]);

              const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError('');
                setInactivityNotice(false);
                try {
                  await signInWithEmailAndPassword(auth, email, password);
                } catch (error) {
                  const code = error.code;
                  if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
                      setAuthError('El correo o la contraseña son incorrectos.');
                  } else if (code === 'auth/too-many-requests') {
                      setAuthError('Demasiados intentos. Tu cuenta ha sido bloqueada temporalmente.');
                  } else if (code === 'auth/invalid-email') {
                      setAuthError('El formato del correo electrónico no es válido.');
                  } else if (code === 'auth/network-request-failed') {
                      setAuthError('Error de red. Verifica tu conexión a internet.');
                  } else {
                      setAuthError('Ocurrió un error inesperado al iniciar sesión.');
                  }
                }
              };

              const handleLogout = () => {
                signOut(auth);
              };

              const handleSubmit = async (e) => {
                e.preventDefault();
                if (!amount || !description || isNaN(amount)) return;
                if (currentUser?.role !== 'editor' || !firebaseUser) return;

                const newTxId = crypto.randomUUID();
                const newTx = {
                  type: activeTab,
                  paidBy: paidBy,
                  amount: parseFloat(amount),
                  description,
                  date,
                  splitType: activeTab === 'expense' ? splitType : null,
                  createdAt: new Date().toISOString(),
                  createdBy: currentUser.name
                };

                try {
                  await setDoc(doc(db, 'movimientos', newTxId), newTx);
                  setAmount('');
                  setDescription('');
                  setSplitType('shared');
                } catch (error) {
                  console.error("Error al guardar en la nube:", error);
                }
              };

              const deleteTransaction = (id) => {
                if (currentUser?.role !== 'editor' || !firebaseUser) return;
                setTxToDelete(id);
              };

              const confirmDelete = async (id) => {
                try {
                  await deleteDoc(doc(db, 'movimientos', id));
                  setTxToDelete(null);
                } catch (error) {
                  console.error("Error al eliminar:", error);
                }
              };

              const formatMoney = (val) => `S/. ${Math.abs(val).toFixed(2)}`;

              if (!currentUser) {
                return (
                  <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-md w-full text-center">
                      <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Icon name="Wallet" className="w-8 h-8" />
                      </div>
                      <h1 className="text-2xl font-bold text-slate-800 mb-2">CONCILIADOR DE CUENTAS</h1>
                      <p className="text-slate-500 mb-8">Ingresa tus credenciales de acceso</p>

                      {inactivityNotice && (
                        <div className="bg-amber-50 border border-amber-200 text-amber-800 rounded-lg p-3 mb-4 text-sm flex items-start gap-2 text-left">
                          <Icon name="Clock" className="w-4 h-4 flex-shrink-0 mt-0.5" />
                          <span>Tu sesión se cerró por inactividad (15 min). Vuelve a iniciar sesión.</span>
                        </div>
                      )}

                      <form onSubmit={handleLogin} className="space-y-4">
                        <div>
                          <input 
                            type="email"
                            required
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            placeholder="Correo electrónico"
                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-left"
                          />
                        </div>
                        <div>
                          <input 
                            type="password"
                            required
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            placeholder="Contraseña"
                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-left"
                          />
                        </div>
                        
                        <p className="text-red-500 text-xs font-medium text-left min-h-[16px]">
                          {authError}
                        </p>
                        
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors mt-2 flex justify-center items-center gap-2">
                          <Icon name="LogIn" className="w-4 h-4" /> Iniciar Sesión
                        </button>
                      </form>
                    </div>
                  </div>
                );
              }

              // ==========================================
              // BARRA DE NAVEGACIÓN ENTRE VISTAS
              // ==========================================
              const NavTabs = () => (
                <div className="max-w-4xl mx-auto px-4 mt-6">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-1 flex flex-wrap gap-1">
                    {[
                      { id: 'home', label: 'Inicio', icon: 'Home' },
                      { id: 'monthly', label: 'Mensual', icon: 'Calendar' },
                      { id: 'yearly', label: 'Anual', icon: 'BarChart' },
                      { id: 'search', label: 'Consultas', icon: 'Search' }
                    ].map(tab => (
                      <button
                        key={tab.id}

                    </main>
                  )}

                  {/* ===== VISTA CONSULTAS POR CONCEPTO ===== */}
                  {currentView === 'search' && (
                    <main className="max-w-4xl mx-auto mt-6 px-4 space-y-6">
                      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2 mb-4">
                          <Icon name="Search" className="w-5 h-5 text-blue-600" />
                          Consultas por Concepto
                        </h2>
                        <div className="relative">
                          <Icon name="Search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                          <input 
                            type="text"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            placeholder="Buscar por concepto... (ej. pasajes, mercado, mensualidad)"
                            className="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                          />
                        </div>

                        {searchTerm.trim() && (
                          <div className="mt-5 space-y-3">
                            <div className="grid grid-cols-2 gap-3">
                              <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <p className="text-xs text-slate-500">Resultados</p>
                                <p className="text-lg font-bold text-slate-800">{searchSummary.count}</p>
                              </div>
                              <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <p className="text-xs text-slate-500">Total gastos</p>
                                <p className="text-lg font-bold text-slate-800">{formatMoney(searchSummary.total)}</p>
                              </div>
                            </div>
                            <div>
                              <p className="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-2">Desembolso (quién pagó)</p>
                              <div className="grid grid-cols-2 gap-3">
                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                  <p className="text-xs text-blue-600">Marco</p>
                                  <p className="text-lg font-bold text-blue-700">{formatMoney(searchSummary.marco)}</p>
                                </div>
                                <div className="bg-orange-50 p-3 rounded-xl border border-orange-100">
                                  <p className="text-xs text-orange-600">Eliana</p>
                                  <p className="text-lg font-bold text-orange-700">{formatMoney(searchSummary.eliana)}</p>
                                </div>
                              </div>
                            </div>
                            <div>
                              <p className="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-2">Costo neto (quién lo asumió)</p>
                              <div className="grid grid-cols-2 gap-3">
                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                  <p className="text-xs text-blue-600">Marco</p>
                                  <p className="text-lg font-bold text-blue-700">{formatMoney(searchSummary.marcoNeto)}</p>
                                </div>
                                <div className="bg-orange-50 p-3 rounded-xl border border-orange-100">
                                  <p className="text-xs text-orange-600">Eliana</p>
                                  <p className="text-lg font-bold text-orange-700">{formatMoney(searchSummary.elianaNeto)}</p>
                                </div>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                        {!searchTerm.trim() ? (
                          conceptList.length === 0 ? (
                            <div className="text-center py-10 text-slate-400">
                              <Icon name="Search" className="w-12 h-12 mx-auto mb-3 text-slate-200" />
                              <p>Aún no hay conceptos registrados.</p>
                            </div>
                          ) : (
                            <div>
                              <h3 className="font-bold text-slate-800 mb-1 text-sm">Conceptos registrados</h3>
                              <p className="text-xs text-slate-500 mb-4">Haz clic en un concepto para ver su detalle ({conceptList.length} en total).</p>
                              <div className="space-y-2 max-h-[480px] overflow-y-auto pr-1">
                                {conceptList.map((c, i) => (
                                  <button
                                    key={i}
                                    onClick={() => setSearchTerm(c.label)}
                                    className="w-full flex items-center justify-between p-3 rounded-lg border border-slate-100 hover:bg-blue-50 hover:border-blue-200 transition-colors text-left"
                                  >
                                    <div>
                                      <p className="font-medium text-sm text-slate-800">{c.label}</p>
                                      <p className="text-xs text-slate-500">{c.count} movimiento{c.count !== 1 ? 's' : ''}</p>
                                    </div>
                                    <p className="font-bold text-sm text-slate-800">{formatMoney(c.total)}</p>
                                  </button>
                                ))}
                              </div>
                            </div>
                          )
                        ) : searchResults.length === 0 ? (
                          <React.Fragment>
                            <button onClick={() => setSearchTerm('')} className="text-xs text-blue-600 hover:underline mb-3">← Volver al listado</button>
                            <div className="text-center py-10 text-slate-400 border-2 border-dashed border-slate-100 rounded-xl">
                              <p>Sin coincidencias para "{searchTerm}".</p>
                            </div>
                          </React.Fragment>
                        ) : (
                          <React.Fragment>
                            <button onClick={() => setSearchTerm('')} className="text-xs text-blue-600 hover:underline mb-3">← Volver al listado</button>
                            <div className="space-y-2">
                              {searchResults.map(tx => (
                                <div key={tx.id} className="flex items-center justify-between p-3 rounded-lg border border-slate-100 hover:bg-slate-50">
                                  <div className="flex items-center gap-3">
                                    <div className={`p-2 rounded-full ${tx.type === 'expense' ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                      <Icon name={tx.type === 'expense' ? "Receipt" : "ArrowRightLeft"} className="w-4 h-4" />
                                    </div>
                                    <div>
                                      <p className="font-medium text-sm text-slate-800">{tx.description}</p>
                                      <p className="text-xs text-slate-500">
                                        {tx.date} · {tx.paidBy}
                                        {tx.type === 'expense' && tx.splitType === 'individual' && ' · 100%'}
                                        {tx.type === 'payment' && ' · Pago/Yape'}
                                      </p>
                                    </div>
                                </div>
                                <p className="font-bold text-sm text-slate-800">{formatMoney(tx.amount)}</p>
                              </div>
                            ))}
                          </div>
                          </React.Fragment>
                        )}
                      </div>
                    </main>
                  )}

                  {/* MODAL DE CONFIRMACIÓN DE ELIMINACIÓN */}
                  {txToDelete && (
                    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                      <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">Eliminar registro</h3>
                        <p className="text-slate-600 mb-6 text-sm">¿Estás seguro que deseas eliminar este registro? Esta acción borrará el dato permanentemente de la base de datos.</p>
                        <div className="flex justify-end gap-3">
                          <button 
                            onClick={() => setTxToDelete(null)} 
                            className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition-colors"
                          >
                            Cancelar
                          </button>
                          <button 
                            onClick={() => confirmDelete(txToDelete)} 
                            className="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors flex items-center gap-2"
                          >
                            <Icon name="Trash2" className="w-4 h-4" />
                            Sí, eliminar
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>
